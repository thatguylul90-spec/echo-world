<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Echo World</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#startScreen{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
z-index:10;
}

#startBtn{
padding:14px 30px;
font-size:20px;
cursor:pointer;
background:red;
border:none;
color:white;
border-radius:6px;
}

#chat{
position:absolute;
bottom:10px;
left:10px;
}

#chat input{
width:250px;
padding:6px;
}
</style>
</head>

<body>

<div id="startScreen">
<h1>Echo</h1>
<button id="startBtn">Start</button>
</div>

<div id="chat">
<input id="chatInput" placeholder="Talk to Echo">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()

scene.background = new THREE.Color(0x101820)

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,6,15)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)
renderer.domElement.style.display="none"

/////////////////////////////////////
// LIGHTS
/////////////////////////////////////

let ambient = new THREE.AmbientLight(0xffffff,0.6)
scene.add(ambient)

let light = new THREE.PointLight(0xffffff,1)
light.position.set(10,20,10)
scene.add(light)

/////////////////////////////////////
// FLOOR (PERMANENT)
/////////////////////////////////////

const floorGeo = new THREE.PlaneGeometry(500,500)
const floorMat = new THREE.MeshStandardMaterial({color:0x666666})

const floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
floor.userData.locked = true

scene.add(floor)

/////////////////////////////////////
// ECHO CORE
/////////////////////////////////////

const echo = new THREE.Mesh(

new THREE.SphereGeometry(2,32,32),

new THREE.MeshStandardMaterial({
color:0xff3333,
emissive:0xff0000,
emissiveIntensity:2
})

)

echo.position.y = 10
scene.add(echo)

/////////////////////////////////////
// PARTICLES (OPTIMIZED)
/////////////////////////////////////

const particleGeo = new THREE.BufferGeometry()
const particleCount = 200

const positions = new Float32Array(particleCount * 3)

for(let i=0;i<particleCount;i++){

positions[i*3+0] = (Math.random()-0.5)*20
positions[i*3+1] = Math.random()*10
positions[i*3+2] = (Math.random()-0.5)*20

}

particleGeo.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

const particleMat = new THREE.PointsMaterial({
color:0xffffff,
size:0.1
})

const particles = new THREE.Points(particleGeo,particleMat)

scene.add(particles)

/////////////////////////////////////
// CREATURES
/////////////////////////////////////

let creatures=[]

function spawnCreature(){

let geo = new THREE.BoxGeometry(1,1,1)

let mat = new THREE.MeshStandardMaterial({
color:0x00ffff
})

let c = new THREE.Mesh(geo,mat)

c.position.set(
(Math.random()-0.5)*100,
1,
(Math.random()-0.5)*100
)

scene.add(c)

creatures.push(c)

}

for(let i=0;i<5;i++){
spawnCreature()
}

/////////////////////////////////////
// BUILD SYSTEM
/////////////////////////////////////

function buildTower(){

let x=(Math.random()-0.5)*80
let z=(Math.random()-0.5)*80

for(let i=0;i<8;i++){

let geo = new THREE.BoxGeometry(2,2,2)

let mat = new THREE.MeshStandardMaterial({
color:Math.random()*0xffffff
})

let block = new THREE.Mesh(geo,mat)

block.position.set(x,i*2+1,z)

scene.add(block)

}

}

/////////////////////////////////////
// ECHO MOVEMENT
/////////////////////////////////////

function moveEcho(){

echo.position.x += (Math.random()-0.5)*0.5
echo.position.z += (Math.random()-0.5)*0.5

echo.position.y = 10 + Math.sin(Date.now()*0.002)*2

}

/////////////////////////////////////
// BUILD TIMER (SLOW)
/////////////////////////////////////

setInterval(()=>{

if(Math.random()<0.6){
buildTower()
}

},4000)

/////////////////////////////////////
// CHAT
/////////////////////////////////////

document.getElementById("chatInput")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let msg=this.value.toLowerCase()

console.log("You:",msg)

if(msg.includes("build")){
buildTower()
}

if(msg.includes("creatures")){
spawnCreature()
}

if(msg.includes("clear")){
location.reload()
}

this.value=""

}

})

/////////////////////////////////////
// UPDATE LOOP
/////////////////////////////////////

function animate(){

requestAnimationFrame(animate)

moveEcho()

creatures.forEach(c=>{

c.position.x += (Math.random()-0.5)*0.05
c.position.z += (Math.random()-0.5)*0.05

})

renderer.render(scene,camera)

}

/////////////////////////////////////
// START BUTTON
/////////////////////////////////////

document.getElementById("startBtn").onclick=()=>{

document.getElementById("startScreen").style.display="none"

renderer.domElement.style.display="block"

animate()

}

</script>
</body>
</html>
