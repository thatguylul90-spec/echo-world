<!DOCTYPE html>
<html>
<head>
<title>Echo World</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#chat{
position:absolute;
bottom:10px;
left:10px;
width:260px;
padding:8px;
border:none;
}

#log{
position:absolute;
bottom:50px;
left:10px;
color:white;
font-size:14px;
max-width:300px;
}

#upload{
position:absolute;
top:10px;
left:10px;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:6px;
height:6px;
background:white;
transform:translate(-50%,-50%);
}
</style>

</head>

<body>

<div id="log">Bubble: Echo waking up...</div>

<input id="chat" placeholder="Talk to Echo">
<input type="file" id="upload">

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// SCENE

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.set(0,5,15)


// LIGHT

const light = new THREE.PointLight(0xffffff,1)
light.position.set(20,40,20)
scene.add(light)


// FLOOR

const floorGeo = new THREE.PlaneGeometry(400,400)

const floorMat = new THREE.MeshStandardMaterial({
color:0x555555
})

const floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2

scene.add(floor)


// STARS

const starGeo = new THREE.BufferGeometry()

const starVerts = []

for(let i=0;i<1500;i++){

starVerts.push(
(Math.random()-0.5)*500,
Math.random()*200,
(Math.random()-0.5)*500
)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVerts,3)
)

const starMat = new THREE.PointsMaterial({
color:0xffffff,
size:0.6
})

const stars = new THREE.Points(starGeo,starMat)

scene.add(stars)


// ECHO CORE

const echo = new THREE.Mesh(

new THREE.SphereGeometry(2,32,32),

new THREE.MeshStandardMaterial({
color:0xff3333,
emissive:0xff0000,
emissiveIntensity:2
})

)

echo.position.y = 8

scene.add(echo)


// BUBBLE GLASS

const bubble = new THREE.Mesh(

new THREE.SphereGeometry(1.2,32,32),

new THREE.MeshPhysicalMaterial({
color:0x88ccff,
transparent:true,
opacity:0.4,
roughness:0,
metalness:0,
transmission:1,
thickness:1
})

)

scene.add(bubble)


// PLAYER CONTROLS

let keys = {}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

let yaw=0
let pitch=0

document.body.onclick=()=>{
document.body.requestPointerLock()
}

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement===document.body){

yaw -= e.movementX*0.002
pitch -= e.movementY*0.002

pitch = Math.max(-1.5,Math.min(1.5,pitch))

camera.rotation.set(pitch,yaw,0)

}

})

function movePlayer(){

let speed=0.3

if(keys["w"]) camera.translateZ(-speed)
if(keys["s"]) camera.translateZ(speed)
if(keys["a"]) camera.translateX(-speed)
if(keys["d"]) camera.translateX(speed)

if(keys[" "]) camera.position.y+=speed
if(keys["shift"]) camera.position.y-=speed

}


// CITY BUILDER

function buildCity(x,z){

let size=4+Math.random()*8

for(let i=0;i<20;i++){

let height=Math.random()*20+4

let geo=new THREE.BoxGeometry(2,height,2)

let mat=new THREE.MeshStandardMaterial({
color:Math.random()*0xffffff
})

let building=new THREE.Mesh(geo,mat)

building.position.set(
x+(Math.random()-0.5)*size*5,
height/2,
z+(Math.random()-0.5)*size*5
)

scene.add(building)

}

}


// ECHO AI

let targetX=0
let targetZ=0

function echoThink(){

targetX=(Math.random()-0.5)*150
targetZ=(Math.random()-0.5)*150

document.getElementById("log").innerText=
"Bubble: Echo scanning world..."

setTimeout(()=>{

buildCity(targetX,targetZ)

document.getElementById("log").innerText=
"Bubble: Echo created a city."

},3000)

}

setInterval(echoThink,12000)


// FILE LEARNING

document.getElementById("upload").addEventListener("change",e=>{

const file=e.target.files[0]

if(!file) return

document.getElementById("log").innerText=
"Bubble: analyzing file..."

const img=new Image()

img.onload=function(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

const data=ctx.getImageData(0,0,1,1).data

const color=new THREE.Color(
data[0]/255,
data[1]/255,
data[2]/255
)

echo.material.color=color

document.getElementById("log").innerText=
"Bubble: Echo learned a color."

}

img.src=URL.createObjectURL(file)

})


// CHAT

const chat=document.getElementById("chat")

chat.addEventListener("keydown",e=>{

if(e.key==="Enter"){

let msg=chat.value.toLowerCase()

chat.value=""

if(msg.includes("build")){
buildCity(0,0)
}

if(msg.includes("hello")){
document.getElementById("log").innerText=
"Bubble: Hello human."
}

}

})


// ANIMATION

function animate(){

requestAnimationFrame(animate)

movePlayer()

echo.position.x+= (targetX-echo.position.x)*0.01
echo.position.z+= (targetZ-echo.position.z)*0.01

echo.position.y=8+Math.sin(Date.now()*0.002)*2

bubble.position.x=echo.position.x+2
bubble.position.y=echo.position.y
bubble.position.z=echo.position.z

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
